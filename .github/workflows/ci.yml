name: CI — Flask API + nginx (rama main)

on:
  push:
    branches: [main]
    paths:
      - 'infra/app/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: infra/app/api
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/demo-api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/demo-api:latest
      - uses: docker/build-push-action@v6
        with:
          context: infra/app/web
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/demo-web:${{ github.sha }}
            ghcr.io/${{ github.repository }}/demo-web:latest
