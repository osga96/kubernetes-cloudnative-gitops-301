services:
  demo-web:
    build:
      context: app/web
    image: cloudnative-demo-web:local
    ports:
      - "8080:8080"
    depends_on:
      demo-api:
        condition: service_started

  demo-api:
    build:
      context: app/api
      dockerfile: Dockerfile
    image: cloudnative-demo-api:local
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: bata
      POSTGRES_DB: eu
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d lab"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  loadgen:
    image: curlimages/curl:8.12.1
    depends_on:
      demo-api:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          curl -sf "http://demo-api:8081/work" >/dev/null || true
          sleep 5
        done
