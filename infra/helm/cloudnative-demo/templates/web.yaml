apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
    spec:
      containers:
        - name: web
          image: {{ .Values.web.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-web
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: demo-web
  ports:
    - port: {{ .Values.web.servicePort }}
      targetPort: 8080
      nodePort: {{ .Values.web.nodePort }}
